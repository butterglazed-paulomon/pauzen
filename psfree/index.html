<html>
    <head>
        <meta charset='utf-8'>
        <title>Paulomon's PSFree for 9.00</title>
        <style>
            @font-face {
                font-family: 'logging';
                src: url('fonts/LiberationMono-Regular.ttf');
            }
            body {
                background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url("rop/bg3.jpg");
                background-repeat: no-repeat;
                background-size: cover;
                background-position: center;
                background-color: black;
                color: white;
                font-family: sans-serif;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-around;
                height: 100vh;
                overflow: hidden;
            }
            #left-panel {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                flex: 1;
                z-index: 1;
            }
            #hero-container {
                position: relative;
                width: 400px;
                height: 400px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 20px;
            }
            #hero-aura {
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(57, 255, 20, 0.4) 0%, rgba(57, 255, 20, 0) 70%);
                animation: rotate-aura 4s linear infinite;
                filter: blur(20px);
            }
            @keyframes rotate-aura {
                0% { transform: rotate(0deg) scale(1); }
                50% { transform: rotate(180deg) scale(1.1); }
                100% { transform: rotate(360deg) scale(1); }
            }
            #hero {
                width: 350px;
                z-index: 2;
                position: relative;
            }
            #info-text {
                text-align: center;
                font-size: 1.2em;
            }
            #console-container {
                flex: 1;
                height: 80vh;
                margin: 0 40px;
                display: flex;
                flex-direction: column;
                z-index: 1;
                min-width: 0; /* Critical for preventing flex items from overflowing parent */
                overflow: hidden;
            }
            #console {
                font-family: 'logging';
                background: rgba(0, 20, 0, 0.85);
                color: #39FF14; /* Neon Green */
                padding: 20px;
                border: 1px solid #39FF14;
                border-radius: 10px;
                height: 100%;
                overflow-y: auto;
                overflow-x: hidden; /* Prevent horizontal shift */
                text-align: left;
                white-space: pre-wrap;
                word-break: break-all; /* Ensure long hex dumps don't push width */
                box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
                font-size: 14px;
                scrollbar-width: thin;
                scrollbar-color: #39FF14 rgba(0, 0, 0, 0.5);
            }
            #console::-webkit-scrollbar {
                width: 8px;
            }
            #console::-webkit-scrollbar-track {
                background: rgba(0, 0, 0, 0.5);
            }
            #console::-webkit-scrollbar-thumb {
                background-color: #39FF14;
                border-radius: 10px;
            }
            a {
                color: #00aeef;
            }
        </style>
        <script>
        if (window.applicationCache.status=='0')
        {
          window.location.replace("cache.html");
        }
        </script>
    </head>
    <body>
        <div id="left-panel">
            <div id="hero-container">
                <div id="hero-aura"></div>
                <img id="hero" src="rop/kexploit.png" alt="PSFree Logo">
            </div>
            <div id="info-text">
                @tinkeringwithPaulomon
                <br>
                <br>
                Visit <a href='www.fb.com/tinkeringwithPaulomon'>Mga Pagkukutingting ni Paulomon</a>
				<br>
				Credits to the PS4 Scene for this exploit.
            </div>
        </div>
        <div id="console-container">
            <pre id='console'></pre>
        </div>
    </body>
    <script type='module' src='./alert.mjs'></script>
</html>
