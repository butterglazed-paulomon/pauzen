<html>
    <head>
        <meta charset='utf-8'>
        <title>Paulomon's PSFree for 9.00</title>
        <style>
            @font-face {
                font-family: 'logging';
                src: url('fonts/LiberationMono-Regular.ttf');
            }
            body {
                background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url("rop/bg3.jpg");
                background-repeat: no-repeat;
                background-size: cover;
                background-position: center;
                background-color: black;
                color: white;
                font-family: sans-serif;
                margin: 0;
                padding: 0;
                overflow: hidden;
                height: 100vh;
            }
            #ui-wrapper {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-around;
                height: 100%;
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
                z-index: 10;
            }
            #left-panel {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                flex: 1;
                z-index: 1;
            }
            #hero-container {
                position: relative;
                width: 400px;
                height: 400px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 20px;
            }
            #hero-aura {
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(57, 255, 20, 0.4) 0%, rgba(57, 255, 20, 0) 70%);
                filter: blur(20px);
                display: none; /* Hidden during exploit to save CPU */
            }
            .animating #hero-aura {
                display: block;
                animation: rotate-aura 4s linear infinite;
            }
            @keyframes rotate-aura {
                0% { transform: rotate(0deg) scale(1); }
                50% { transform: rotate(180deg) scale(1.1); }
                100% { transform: rotate(360deg) scale(1); }
            }
            #hero {
                width: 350px;
                z-index: 2;
                position: relative;
            }
            #info-text {
                text-align: center;
                font-size: 1.2em;
            }
            #console-container {
                flex: 1;
                height: 80vh;
                margin: 0 40px;
                display: flex;
                flex-direction: column;
                z-index: 1;
                min-width: 0;
                overflow: hidden;
            }
            #console {
                font-family: 'logging';
                background: rgba(0, 20, 0, 0.85);
                color: #39FF14;
                padding: 20px;
                border: 1px solid #39FF14;
                border-radius: 10px;
                height: 100%;
                overflow-y: auto;
                overflow-x: hidden;
                text-align: left;
                white-space: pre-wrap;
                word-break: break-all;
                box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
                font-size: 14px;
                scrollbar-width: thin;
                scrollbar-color: #39FF14 rgba(0, 0, 0, 0.5);
            }
            /* Hide exploit elements visually but keep them functional */
            input, a#bar {
                position: absolute;
                left: -1000px;
                top: -1000px;
            }
        </style>
        <script>
        if (window.applicationCache.status=='0')
        {
          window.location.replace("cache.html");
        }

        window.onload = () => {
            const ua = navigator.userAgent;
            const isPS4 = ua.indexOf('PlayStation 4') !== -1;
            const statusBar = document.getElementById('status-bar');
            
            if (!isPS4) {
                const overlay = document.getElementById('unsupported-overlay');
                const browserInfo = document.getElementById('browser-info');
                browserInfo.innerText = ua;
                overlay.style.display = 'flex';
                return;
            }

            statusBar.style.display = 'block';
            statusBar.innerText = 'Exploit ongoing, do not close the browser and wait.';
        };

        function setExploitDone() {
            const statusBar = document.getElementById('status-bar');
            if (statusBar) {
                statusBar.innerText = 'Exploit done, you may close the browser.';
                statusBar.style.color = '#00aeef';
                statusBar.style.borderColor = '#00aeef';
            }
            document.body.classList.add('animating');
        }
        </script>
    </head>
    <body>
        <div id="unsupported-overlay">
            <h1>You look lost.</h1>
            <p>This page is for PS4 browsers only.</p>
            <p>You are on: <br><span id="browser-info" style="color: #39FF14;"></span></p>
        </div>

        <div id="status-bar"></div>

        <div id="ui-wrapper">
            <div id="left-panel">
                <div id="hero-container">
                    <div id="hero-aura"></div>
                    <img id="hero" src="rop/kexploit.png" alt="PSFree Logo">
                </div>
                <div id="info-text">
                    @tinkeringwithPaulomon
                    <br>
                    <br>
                    Visit <a href='www.fb.com/tinkeringwithPaulomon'>Mga Pagkukutingting ni Paulomon</a>
                    <br>
                    Credits to the PS4 Scene for this exploit.
                </div>
            </div>
            <div id="console-container">
                <pre id='console'></pre>
            </div>
        </div>
    </body>
    <script type='module' src='./alert.mjs'></script>
</html>
